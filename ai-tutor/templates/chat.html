<!DOCTYPE html>
<html>
<head>
    <title>AI Tutor Chatbot</title>
</head>
<body>

    <h1>🤖 AI Tutor Chatbot</h1>

    <form method="POST">

        <input
            type="text"
            name="message"
            placeholder="Ask your question..."
            required
            style="width:400px;"
        >

        <button type="submit">
            Send
        </button>

    </form>

    <hr>

    {% for msg in messages %}

        <p>
            <b>You:</b>
            {{ msg.user }}
        </p>

        <p>
            <b>AI Tutor:</b>
            {{ msg.bot }}
        </p>

        <hr>

    {% endfor %}

    <a href="/dashboard">
        Back to Dashboard
    </a>

</body>
</html>
