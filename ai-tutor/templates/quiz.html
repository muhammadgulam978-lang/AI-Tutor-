<!DOCTYPE html>
<html>
<head>
    <title>Adaptive AI Quiz</title>
    <style>
        body {
            font-family: Arial, sans-serif;
            margin: 40px;
            background-color: #f4f7f6;
            color: #333;
        }
        .quiz-container {
            background-color: #fff;
            padding: 30px;
            border-radius: 8px;
            box-shadow: 0 4px 8px rgba(0,0,0,0.1);
            max-width: 600px;
            margin: 0 auto;
        }
        .badge {
            background-color: #007bff;
            color: white;
            padding: 5px 10px;
            border-radius: 4px;
            font-size: 14px;
            font-weight: bold;
        }
        .question-block {
            margin-bottom: 25px;
            border-bottom: 1px solid #eee;
            padding-bottom: 15px;
        }
        button {
            background-color: #28a745;
            color: white;
            border: none;
            padding: 12px 20px;
            font-size: 16px;
            border-radius: 4px;
            cursor: pointer;
        }
        button:hover {
            background-color: #218838;
        }
    </style>
</head>
<body>

    <div class="quiz-container">
        <h1>🧠 AI Tutor Adaptive Quiz</h1>
        <p>Current Tailored Difficulty: <span class="badge">{{ difficulty }}</span></p>
        <hr>

        <form method="POST" action="/submit_quiz">
            
            {# Loop over dynamic questions sent from backend #}
            {% for q in questions %}
                <div class="question-block">
                    <p><strong>{{ loop.index }}. {{ q.question }}</strong></p>
                    
                    {% for option in q.options %}
                        <label>
                            <input type="radio" name="{{ q.id }}" value="{{ option }}" required>
                            {{ option }}
                        </label><br style="margin-bottom: 8px;">
                    {% endfor %}
                </div>
            {% endfor %}

            <button type="submit">Submit Quiz</button>
        </form>
    </div>

</body>
</html>
